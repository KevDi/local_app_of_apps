prometheusOperator:
  resources:
    limits:
      cpu: 200m
      memory: 200Mi
    requests:
      cpu: 50m
      memory: 50Mi

alertmanager:
  enabled: false

prometheus:
  prometheusSpec:
    replicaCount: 1
    retention: 2d

    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

    resources:
      limits:
        cpu: 500m
        memory: 1000Mi
      requests:
        cpu: 100m
        memory: 250Mi

grafana:
  enabled: true
  adminPassword: "admin"

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - grafana.localhost
    path: /
    tls:
      - hosts:
          - grafana.localhost

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "default"
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      traefik-v3:
        gnetId: 17346
        revision: 1
        datasource: Prometheus
      argocd:
        gnetId: 14511
        revision: 2
        datasource: Prometheus
      influxdb2:
        gnetId: 14418
        revision: 1
        datasource: Prometheus
