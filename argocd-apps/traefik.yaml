apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: "https://traefik.github.io/charts"
      chart: traefik
      targetRevision: 40.2.0
      helm:
        releaseName: traefik
        valueFiles:
          - $our-repo/apps-config/traefik-values.yaml

    - repoURL: "https://github.com/KevDi/local_app_of_apps"
      targetRevision: HEAD
      ref: our-repo
  destination:
    server: "https://kubernetes.default.svc"
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
