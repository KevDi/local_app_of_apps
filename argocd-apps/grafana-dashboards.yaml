              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Value": true,
                  "dest_server": true,
                  "job": true
                },
                "indexByName": {
                  "health_status": 2,
                  "name": 0,
                  "project": 1,
                  "sync_status": 3
                },
                "renameByName": {
                  "dest_server": "Cluster",
                  "health_status": "Health Status",
                  "job": "Job",
                  "name": "Application",
                  "project": "Project",
                  "sync_status": "Sync Status"
